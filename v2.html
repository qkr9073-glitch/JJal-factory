<title>짤공장 — PC 전체 UI 프로토타입</title>
<style>
  :root{
    color-scheme:dark;
    --bg:#0b1310; --panel:#12201a; --panel2:#0f1a15; --raised:#182a22;
    --line:#22362d; --line2:#2d4738;
    --ink:#e9f1ec; --muted:#93a89c; --faint:#66786e;
    --gold:#34d399; --gold-ink:#04120c;
    --good:#4bd39a; --pend:#e0a94a; --insta:#5b9be8; --jp:#c07ae0; --danger:#e07070;
    --teal:#3fae86; --terra:#e0805a;
    --shadow:0 24px 60px -24px rgba(0,0,0,.7);
    --font:'Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
  }
  :root[data-theme="light"]{
    color-scheme:light;
    --bg:#eef3f0; --panel:#fff; --panel2:#f4f8f5; --raised:#fff;
    --line:#e0e7e2; --line2:#d2ddd6;
    --ink:#15201b; --muted:#566b60; --faint:#87968e;
    --gold:#0f9d6b; --gold-ink:#fff; --good:#2f9160; --pend:#c07a1e; --insta:#2f6fc2; --jp:#8a3cc0; --danger:#c94a4a;
    --teal:#1f8a68; --terra:#c85e37;
    --shadow:0 20px 50px -22px rgba(30,40,70,.28);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  html,body{overflow-x:hidden}          /* 좌우 슬라이드 전환이 가로 스크롤바를 만들지 않게 */
  body{background:var(--bg); color:var(--ink); font-family:var(--font); -webkit-font-smoothing:antialiased}
  button,input,select,textarea{font-family:inherit}
  button{cursor:pointer}
  ::-webkit-scrollbar{width:10px;height:10px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px}

  .app{max-width:1400px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column}
  /* ===== top nav ===== */
  .topbar{display:flex; align-items:center; gap:16px; padding:13px 22px; border-bottom:1px solid var(--line); position:sticky; top:0; background:color-mix(in srgb,var(--bg) 90%, transparent); backdrop-filter:blur(8px); z-index:20}
  .brand{font-weight:800; font-size:15.5px; display:flex; align-items:center; gap:9px; white-space:nowrap}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 22%,transparent)}
  .tabs{display:flex; gap:3px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:4px}
  .tabs button{border:0;background:transparent;color:var(--muted);font-size:13.5px;font-weight:700;padding:9px 16px;border-radius:9px;display:flex;align-items:center;gap:7px;transition:.15s}
  .tabs button:hover{color:var(--ink)}
  .tabs button.on{background:var(--raised);color:var(--ink);box-shadow:0 1px 0 rgba(0,0,0,.25)}
  .tabs button .sub{font-size:11px;font-weight:600;color:var(--faint)}
  .tabs button.on .sub{color:var(--muted)}
  .tabdrop{position:relative}
  .tabdrop .caret{font-size:10px;opacity:.6;margin-left:-2px}
  .dropmenu{position:absolute;top:calc(100% + 6px);left:0;min-width:172px;background:var(--raised);border:1px solid var(--line2);border-radius:12px;padding:5px;box-shadow:var(--shadow);display:none;flex-direction:column;gap:2px;z-index:40}
  .dropmenu::before{content:"";position:absolute;top:-8px;left:0;right:0;height:8px}  /* hover 브릿지(갭 메움) */
  .tabdrop:hover .dropmenu,.tabdrop.open .dropmenu{display:flex}
  .dropmenu button{width:100%;justify-content:flex-start;color:var(--muted)}
  .dropmenu button:hover{background:var(--panel2);color:var(--ink)}
  .dropmenu button.on{background:color-mix(in srgb,var(--gold) 18%,transparent);color:var(--gold)}
  /* 예약·승인 계정칩 + 월간 캘린더 */
  .acclabel{font-size:12px;font-weight:800;color:var(--faint);margin:2px 0 8px}
  .acrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .achip{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:999px;padding:9px 15px;font-size:13px;font-weight:800;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:7px}
  .achip:hover{border-color:var(--line2);color:var(--ink)}
  .achip.on{background:color-mix(in srgb,var(--gold) 16%,transparent);border-color:var(--gold);color:var(--gold)}
  .achip b{font-size:11px;background:var(--panel2);color:var(--muted);border-radius:6px;padding:1px 6px}
  .achip.on b{background:var(--gold);color:#04120c}
  .calhead{display:flex;align-items:center;gap:12px;margin-bottom:10px}
  .calhead .mo{font-size:17px;font-weight:800;min-width:150px;text-align:center}
  .calhead button{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:9px;width:34px;height:34px;font-size:16px;cursor:pointer}
  .calhead button:hover{border-color:var(--gold);color:var(--gold)}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px}
  .dow span{text-align:center;font-size:11px;font-weight:800;color:var(--faint)}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .calcell{min-height:104px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:6px 6px 5px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
  .calcell.other{opacity:.4}
  .calcell.today{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold) inset}
  .calcell .cd{font-size:12px;font-weight:800;color:var(--muted)}
  .calcell.today .cd{color:var(--gold)}
  .calcell .cd .sun{color:#e0574b}
  .ev{font-size:10.5px;font-weight:700;background:var(--panel2);border-radius:5px;padding:3px 5px 3px 6px;border-left:3px solid var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.35}
  .ev .evt{font-variant-numeric:tabular-nums;color:var(--ink);font-weight:800}
  .ev .mini{display:inline-flex;gap:3px;margin-left:3px}
  .ev .mini i{font-style:normal;border-radius:4px;padding:0 4px;font-size:10px}
  .ev .ap{background:var(--insta);color:#fff;cursor:pointer}
  .ev .rj{background:var(--danger);color:#fff;cursor:pointer}
  .apwait{background:color-mix(in srgb,#f59e0b 12%,transparent);border:1px solid color-mix(in srgb,#f59e0b 45%,transparent);border-radius:10px;padding:12px 14px;margin-bottom:16px}
  .apwait h4{font-size:13.5px;margin-bottom:8px;color:#f59e0b}
  /* 예약 상세 미리보기 모달 */
  .smodal{width:min(440px,92vw);background:var(--raised);border:1px solid var(--line2);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column}
  .smhead{display:flex;align-items:center;gap:9px;padding:13px 15px;border-bottom:1px solid var(--line)}
  .smhead b{font-size:14.5px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}
  .smstat{font-size:12px;font-weight:800}
  .smprev{position:relative;background:#000;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .smprev img,.smprev video{width:100%;height:100%;object-fit:contain;display:block}
  .smnav{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;border:0;background:rgba(0,0,0,.5);color:#fff;font-size:18px;cursor:pointer;z-index:2}
  .smnav.l{left:8px}.smnav.r{right:8px}
  .smcount{position:absolute;bottom:8px;right:10px;background:rgba(0,0,0,.6);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:999px;z-index:2}
  .sminfo{padding:12px 15px 6px;font-size:13px;font-weight:700;color:var(--muted);line-height:1.6}
  .smcap{margin:0 15px 12px;padding:9px 11px;background:var(--panel2);border:1px solid var(--line);border-radius:9px;font-size:12px;color:var(--muted);line-height:1.5;white-space:pre-wrap;max-height:110px;overflow:auto}
  .smcap .cl{font-size:11px;font-weight:800;color:var(--faint);display:block;margin-bottom:4px}
  .smfoot{display:flex;align-items:center;gap:8px;padding:12px 15px;border-top:1px solid var(--line)}
  /* 유튜브 짤 빨간 재생버튼 아이콘 (이미지 없이 CSS) */
  .ytplay{display:inline-flex;align-items:center;justify-content:center;width:20px;height:14px;background:#ff0033;border-radius:4px;vertical-align:-2px;flex:0 0 auto}
  .ytplay::before{content:"";border-style:solid;border-width:4px 0 4px 7px;border-color:transparent transparent transparent #fff;margin-left:1px}
  .ytplay.sm{width:17px;height:12px}.ytplay.sm::before{border-width:3.5px 0 3.5px 6px}
  /* IE 수출 팩 선택 리스트 */
  .iepacklist{display:flex;flex-direction:column;gap:6px;max-height:300px;overflow:auto}
  .ieprow{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid var(--line);border-radius:9px;background:var(--panel);cursor:pointer;font-size:13px;font-weight:700}
  .ieprow:hover{border-color:var(--line2)}
  .ieprow.on{border-color:var(--gold);background:color-mix(in srgb,var(--gold) 12%,transparent)}
  .ieprow .tt{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* IE 수입 방식 · 인스타 수집 결과 */
  .igcard{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--panel)}
  .igcard img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#000}
  .igth{position:relative;aspect-ratio:1;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:34px;color:var(--faint)}
  .igth img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .igcard .ib{padding:9px 10px}
  .iggrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
  /* 브라우저 수집 목록: 5열 + 세로 2줄 버튼 */
  .collgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  @media(max-width:1100px){.collgrid{grid-template-columns:repeat(4,1fr)}}
  @media(max-width:820px){.collgrid{grid-template-columns:repeat(3,1fr)}}
  .collgrid .ib{padding:7px 8px}
  .collbtns{margin-top:7px;display:flex;flex-direction:column;gap:4px}
  .collmk{width:100%;font-size:11.5px;font-weight:800;padding:7px 4px;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
  .collrow{display:flex;gap:4px}
  .collmini{padding:5px 6px;font-size:12px;min-width:30px;text-align:center;line-height:1.2}
  .wizbar{display:flex;align-items:center;gap:4px;flex-wrap:wrap;padding:12px 6px 4px;font-size:12.5px}
  .wizstep{padding:5px 11px;border-radius:20px;background:var(--panel2);color:var(--faint);border:1px solid var(--line)}
  .wizstep.on{background:var(--gold);color:#12141a;font-weight:800;border-color:var(--gold)}
  .wizstep.done{color:var(--muted)}
  .wizsep{color:var(--faint)}
  .lcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px}
  .catrow{display:flex;align-items:center;gap:6px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:9px 11px;margin-bottom:7px}
  @keyframes subpop{0%{transform:scale(.55)}12%{transform:scale(1.10)}22%{transform:scale(1)}100%{transform:scale(1)}}
  .catgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
  .scriptgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px}
  .scriptcard{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:16px;display:flex;flex-direction:column;gap:11px}
  .scriptcard .schead{border-bottom:1px solid var(--line);padding-bottom:10px}
  .scriptcard .sctitle{font-weight:800;font-size:15.5px;line-height:1.35}
  .scriptcard .scapproach{font-size:12px;color:var(--gold);font-weight:700;margin-top:4px;line-height:1.45}
  .scriptcard .scbody{font-size:15px;line-height:1.9;color:var(--ink);white-space:pre-wrap;flex:1}
  .catcard{background:var(--panel2);border:1px solid var(--line);border-radius:13px;overflow:hidden;display:flex;flex-direction:column}
  .catcard .banner{height:84px;display:flex;align-items:center;justify-content:center;font-size:38px;position:relative;text-shadow:0 2px 8px rgba(0,0,0,.35)}
  .catcard .cnt{position:absolute;top:7px;right:8px;background:rgba(10,14,20,.62);color:#fff;font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;text-shadow:none}
  .catcard .cbody{padding:10px 12px 4px;flex:1;display:flex;flex-direction:column;gap:4px}
  .catcard .cnm{font-weight:800;font-size:14.5px}
  .catcard .csm{font-size:11.5px;color:var(--muted);line-height:1.45;max-height:52px;overflow:hidden}
  .catcard .cacts{display:flex;gap:4px;padding:9px 11px}
  .trpick{position:absolute;top:5px;left:5px;display:flex;align-items:center;gap:3px;background:rgba(10,14,20,.72);border:1.5px solid rgba(255,255,255,.35);border-radius:8px;padding:3px 6px;font-size:12px;cursor:pointer;user-select:none}
  .trpick.on{background:var(--gold);border-color:var(--gold);color:#12141a}
  .trpick input{margin:0;cursor:pointer}
  .collsel{background:color-mix(in srgb,var(--gold) 20%,transparent)!important;color:var(--gold)!important;border:1px solid var(--gold)!important}
  /* 릴스 대량 예약 */
  .bvid{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;background:var(--panel);margin-bottom:6px;font-size:12.5px;cursor:grab}
  .bvid.drag{opacity:.4}
  .bvid .bh{color:var(--faint);cursor:grab}
  .bvid .bn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .bvid .bsz{color:var(--faint);font-size:11px}
  .bvid button{border:0;background:transparent;color:var(--danger);cursor:pointer;font-size:13px}
  .tchip{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:5px 11px;font-size:12.5px;font-weight:800;margin:0 6px 6px 0}
  .tchip b{cursor:pointer;color:var(--danger)}
  .tchip.add{cursor:pointer;color:var(--gold);border-style:dashed}
  .bulkaddrow{display:flex;align-items:center;gap:6px;margin-top:4px;flex-wrap:wrap}
  .bulkaddrow select{padding:6px 8px}
  .bulkaddrow .ampm{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .bulkaddrow .ampm button{border:0;background:var(--panel);color:var(--muted);padding:6px 10px;font-size:12px;font-weight:800;cursor:pointer}
  .bulkaddrow .ampm button.on{background:var(--gold);color:#04120c}
  .prow{display:flex;align-items:center;gap:10px;padding:8px 11px;border-bottom:1px solid var(--line);font-size:13px}
  .prow .pn{width:26px;height:26px;flex:0 0 26px;border-radius:7px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted)}
  .prow .pv{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700}
  .prow .pt{font-variant-numeric:tabular-nums;font-weight:800;color:var(--gold)}
  .topbar .sp{flex:1}
  .codepill{display:flex;align-items:center;gap:7px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:7px 11px}
  .codepill input{border:0;background:transparent;color:var(--ink);font-size:12.5px;width:82px;outline:none}
  .iconbtn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);color:var(--muted);font-size:15px}
  .iconbtn:hover{color:var(--ink);border-color:var(--line2)}

  /* ===== generic two-pane maker ===== */
  .view{flex:1;min-height:0;display:flex}
  .side{width:360px;flex:0 0 360px;border-right:1px solid var(--line);padding:20px 18px;overflow:auto}
  .mainpane{flex:1;min-width:0;padding:20px 22px 44px;overflow:auto}
  .step{margin-bottom:20px}
  .step .sh{display:flex;align-items:center;gap:9px;margin-bottom:9px}
  .step .num{width:22px;height:22px;border-radius:50%;background:var(--gold);color:var(--gold-ink);font-size:12px;font-weight:900;display:flex;align-items:center;justify-content:center}
  .step .st{font-size:13.5px;font-weight:800}
  .step .sd{font-size:11.5px;color:var(--faint);margin-left:auto}
  label.fld{display:block;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin:0 2px 6px}
  input.in,select.in,textarea.in{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--ink);font-size:13px;padding:11px 12px;outline:none}
  input.in:focus,select.in:focus,textarea.in:focus{border-color:var(--gold)}
  textarea.in{resize:vertical;line-height:1.55}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chip{font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:9px;background:var(--panel2);color:var(--muted);border:1px solid var(--line)}
  .chip.on{background:color-mix(in srgb,var(--gold) 16%,transparent);color:var(--gold);border-color:color-mix(in srgb,var(--gold) 42%,transparent)}
  .tpl{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .tpl .t{border:2px solid var(--line);border-radius:10px;overflow:hidden;cursor:pointer;position:relative}
  .tpl .t.on{border-color:var(--gold)}
  .tpl .t .pv{aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
  .tpl .t .pv img{width:100%;height:100%;object-fit:cover;display:block}
  .tpl .t .nm{font-size:10.5px;font-weight:700;text-align:center;padding:4px 2px;background:var(--panel2)}
  .tpl .t.on .nm{background:var(--gold);color:var(--gold-ink)}
  .checks{display:flex;flex-direction:column;gap:8px}
  .ck{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;color:var(--muted);background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer}
  .ck input{margin-top:2px}
  .ck.warn{border-color:color-mix(in srgb,var(--terra) 40%,transparent);background:color-mix(in srgb,var(--terra) 10%,transparent);color:var(--terra)}
  .ck b{color:var(--ink)}
  .go{width:100%;background:var(--gold);color:var(--gold-ink);border:1px solid var(--gold);font-size:14.5px;font-weight:800;padding:13px;border-radius:11px;box-shadow:0 8px 22px -10px color-mix(in srgb,var(--gold) 70%,transparent)}
  .go:hover{filter:brightness(1.05)}
  .collapse{margin-top:12px;border:1px dashed var(--line2);border-radius:10px;overflow:hidden}
  .collapse>summary{list-style:none;padding:11px 13px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:8px}
  .collapse>summary::-webkit-details-marker{display:none}
  .collapse[open]>summary{color:var(--ink);border-bottom:1px solid var(--line)}
  .collapse .cbody{padding:12px 13px;font-size:12px;color:var(--muted);line-height:1.55}
  .panehead{display:flex;align-items:baseline;gap:10px;margin:0 2px 15px}
  .panehead h2{font-size:17px;margin:0}
  .panehead .n{font-size:12.5px;color:var(--faint)}
  .panehead .r{margin-left:auto;display:flex;gap:6px}

  /* hot posts list (짤) */
  .hotgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
  .hot{display:flex;gap:11px;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px;align-items:center}
  .hot .th{width:58px;height:58px;border-radius:9px;flex:0 0 58px;display:flex;align-items:center;justify-content:center;font-size:17px}
  .hot .info{flex:1;min-width:0}
  .hot .tt{font-size:13px;font-weight:700;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .hot .mt{font-size:11px;color:var(--faint);margin-top:3px;font-variant-numeric:tabular-nums}
  .hot .src{font-size:10.5px;font-weight:800;color:var(--teal)}
  .hot button{flex:0 0 auto;border:1px solid var(--line);background:var(--panel2);color:var(--ink);font-size:12.5px;font-weight:800;padding:9px 13px;border-radius:9px}
  .hot button:hover{border-color:var(--gold);color:var(--gold)}
  .hot.used{opacity:.5}

  /* template gallery (card) */
  .tgal{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:14px}
  .tg{border:2px solid var(--line);border-radius:13px;overflow:hidden;cursor:pointer}
  .tg.on{border-color:var(--gold)}
  .tg .pv{aspect-ratio:4/5;overflow:hidden;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-weight:800;color:#fff;font-size:12px;text-align:center;padding:8px}

<script>
  const HUES=[210,28,150,340,52,268,190,8,120,300,175,45];
  const grad=s=>{const h=HUES[((s%HUES.length)+HUES.length)%HUES.length];return `linear-gradient(150deg,hsl(${h} 60% 32%),hsl(${(h+40)%360} 55% 20%))`;};
  const $=id=>document.getElementById(id);

  /* ============ TAB ROUTER (제작소 드롭다운 통합) ============ */
  const tabsEl=$('tabs');
  const STUDIO=['jjal','card','autoreel','reel','thread'];
  const STUDIO_LABEL={jjal:'짤',card:'카드뉴스',autoreel:'릴스',reel:'릴스 예약',thread:'스레드'};
  let STUDIO_CUR='jjal';
  tabsEl.addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    if(b.id==='studioBtn'){setActive(STUDIO_CUR);return;}
    if(b.dataset.t)setActive(b.dataset.t);});
  // 제작소 드롭다운: 마우스가 탭/메뉴 위에 있으면 항상 열림(닫힘은 살짝 지연 → 갭에서 안 꺼짐)
  (function(){const drop=$('studioDrop'); if(!drop)return; let dt;
    const open=()=>{clearTimeout(dt);drop.classList.add('open');};
    const close=()=>{clearTimeout(dt);dt=setTimeout(()=>drop.classList.remove('open'),280);};
    drop.addEventListener('mouseenter',open);
    drop.addEventListener('mouseleave',close);
    drop.addEventListener('click',()=>{clearTimeout(dt);drop.classList.remove('open');});})();
  let CURTAB='jjal';
  let _booted=false;
  function setActive(t){
    const prev=CURTAB;
    CURTAB=t;
    try{localStorage.setItem('mftab',t);}catch(_){}   // 새로고침 시 마지막 탭 복원용
    if(STUDIO.includes(t))STUDIO_CUR=t;
    $('studioBtn').classList.toggle('on',STUDIO.includes(t));
    const lab=$('studioBtn').querySelector('span');
    if(lab)lab.textContent=STUDIO.includes(t)?('제작소 · '+STUDIO_LABEL[t]):'제작소';
    document.querySelectorAll('#tabs [data-t]').forEach(x=>x.classList.toggle('on',x.dataset.t===t));
    if(!_booted||prev===t){_booted=true;route(t);return;}    // 최초 로드/같은 탭은 애니 없이
    slideEl($('view'),()=>route(t),tabIdx(t)-tabIdx(prev));   // 탭 순서로 좌우 방향 결정
  }
  function route(t){({jjal:renderJjal,card:renderCard,autoreel:renderAutoReel,reel:renderReel,thread:renderThread,ie:renderIE,sched:renderSchedule,result:renderResults,members:renderMembers}[t]||renderJjal)();}

  /* ===== 좌우 슬라이딩 전환 (탭 · 위저드 단계, 버튼만) ===== */
  const TAB_ORDER=['jjal','card','autoreel','reel','thread','ie','sched','result','members'];
  const tabIdx=t=>{const i=TAB_ORDER.indexOf(t);return i<0?0:i;};
  const reducedMotion=()=>window.matchMedia&&matchMedia('(prefers-reduced-motion: reduce)').matches;
  let _slideActive=null;   // 진행 중 애니 {el, cancel} — 새 전환이 오면 이전 걸 즉시 종료
  // el의 innerHTML을 renderFn으로 교체하되, dir 방향(+ 오른쪽에서 / - 왼쪽에서)으로 스르륵 슬라이드
  function slideEl(el,renderFn,dir){
    if(!el||reducedMotion()){renderFn();return;}
    if(_slideActive){_slideActive.cancel();_slideActive=null;}   // 이전 전환 잔상 제거
    const outX=dir>=0?-34:34, inX=dir>=0?34:-34;
    let cancelled=false; const timers=[];
    const wipe=()=>{el.style.transition='';el.style.transform='';el.style.opacity='';};
    const cancel=()=>{cancelled=true;timers.forEach(clearTimeout);wipe();};
    const finish=()=>{if(_slideActive&&_slideActive.el===el)_slideActive=null;wipe();};
    _slideActive={el,cancel};
    const swapIn=()=>{
      if(cancelled)return;
      renderFn();                                   // 안 보일 때 내용 교체(높이 점프 숨김)
      el.style.transition='none'; el.style.transform='translateX('+inX+'px)'; el.style.opacity='0';
      void el.offsetWidth;                          // reflow
      el.style.transition='transform .22s cubic-bezier(.22,.61,.36,1), opacity .22s ease';
      el.style.transform='translateX(0)'; el.style.opacity='1';
      timers.push(setTimeout(()=>{if(!cancelled)finish();},260));
    };
    el.style.transition='transform .14s ease, opacity .14s ease';
    el.style.transform='translateX('+outX+'px)'; el.style.opacity='0';
    timers.push(setTimeout(swapIn,150));            // out 끝나면 교체+in
  }

  /* ============ 공용: 접속코드 · API · 잡 폴링 ============ */
  const CODE=$('code');
  CODE.value=localStorage.getItem('mfcode')||'0000';
  const code=()=>CODE.value.trim();

  /* ============ 계정: 로그인 확인 · 권한(관리자/일반) ============ */
  let ME={ok:false,admin:false,role:'',name:''};
  const isAdmin=()=>!!ME.admin;
  async function refreshMe(){
    const c=code();
    if(!c){ME={ok:false,admin:false,role:'',name:''};paintMe();return;}
    try{const d=await apiJson('/api/auth/me',{code:c});
      ME=d.ok?{ok:true,admin:!!d.admin,role:d.role,name:d.name}:{ok:false,admin:false,role:'',name:''};
    }catch(e){ME={ok:false,admin:false,role:'',name:''};}
    paintMe();
  }
  function paintMe(){
    const pill=document.querySelector('.codepill');
    let tag=pill&&pill.querySelector('.whoami');
    if(pill&&!tag){tag=document.createElement('span');tag.className='whoami';pill.appendChild(tag);}
    if(tag){
      if(ME.ok){tag.textContent=(ME.admin?'👑 ':'🙂 ')+(ME.name||'')+(ME.admin?' · 관리자':' · 일반');
        tag.style.cssText='margin-left:8px;font-size:12px;font-weight:800;white-space:nowrap;color:'+(ME.admin?'var(--gold)':'var(--muted)');}
      else{tag.textContent=code()?' ⚠ 잘못된 코드':'';tag.style.cssText='margin-left:8px;font-size:12px;font-weight:800;color:var(--danger)';}
    }
    // 즉시 업로드 옵션: 일반 사용자는 비활성 표시
    document.querySelectorAll('.popopt.now').forEach(el=>{
      el.classList.toggle('locked',!isAdmin());
      const ds=el.querySelector('.ds');
      if(ds) ds.textContent=isAdmin()?'바로 인스타에 게시':'관리자만 가능 — 예약을 이용하세요';
    });
    // 회원관리 탭: 관리자만 노출
    const mt=$('membersTab'); if(mt) mt.style.display=isAdmin()?'':'none';
  }
  CODE.addEventListener('change',()=>{localStorage.setItem('mfcode',code());
    // 코드 바꾸면 권한 갱신 후 현재 탭을 그 사용자 기준으로 다시 렌더(계정 전환 테스트용)
    refreshMe().then(()=>{ if(CURTAB) route(CURTAB); });
    flash('🔑 접속코드 적용됨');});
  const esch=s=>String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  function ensureFontFaces(fonts){
    let st=document.getElementById('libFontFaces');
    if(!st){st=document.createElement('style');st.id='libFontFaces';document.head.appendChild(st);}
    st.textContent=(fonts||[]).map(f=>`@font-face{font-family:'${f.family}';src:url('/fonts/${encodeURIComponent(f.file)}')}`).join('');
  }
  function fontGalleryHTML(fonts,pickFn,selected){
    return (fonts||[]).map(f=>`<div onclick="${pickFn}('${esch(f.file)}')" style="cursor:pointer;padding:7px 10px;border:1px solid ${f.file===selected?'var(--gold)':'var(--line)'};border-radius:9px;margin-bottom:5px;background:${f.file===selected?'color-mix(in srgb,var(--gold) 8%,transparent)':'var(--panel2)'}">
      <span style="font-family:'${esch(f.family)}','Malgun Gothic',sans-serif;font-size:17px">${esch(f.name)} — 다람쥐 헌 쳇바퀴 ABC 123</span></div>`).join('')
      ||'<div style="color:var(--faint);font-size:12px">폰트 없음</div>';
  }
  async function apiJson(path,body){
    const r=await fetch(path,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    return r.json();
  }
  async function startJob(endpoint,body,label){
    if(!code()){flash('접속코드를 입력하세요');return;}
    let d; try{d=await apiJson(endpoint,body);}catch(e){flash('❌ 통신 오류: '+e);return;}
    if(!d.ok){flash('❌ '+d.error);return;}
    const box=$('jjobs'); if(!box) return;
    const div=document.createElement('div'); div.id='row-'+d.job;
    div.style.cssText='background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:10px 13px;margin-bottom:8px;font-size:13px';
    div.innerHTML=`<b>${esch(label)}</b>
      <div class="jbar" style="height:8px;background:var(--panel2);border-radius:6px;margin:7px 0;overflow:hidden"><div style="height:100%;width:3%;background:var(--gold);border-radius:6px;transition:width .5s"></div></div>
      <span class="jm" style="color:var(--gold)">접수됨…</span>`;
    box.prepend(div);
    scrollTopPane(box);      // 문서/패널 어느 쪽이 스크롤되든 맨 위로
    pollJob(d.job);
  }
  function scrollTopPane(el){
    const sc=el&&el.closest('.mainpane');
    if(sc&&sc.scrollHeight>sc.clientHeight+4) sc.scrollTo({top:0,behavior:'smooth'});
    window.scrollTo({top:0,behavior:'smooth'});   // 문서 전체가 스크롤되는 경우 대비
  }
  async function pollJob(jid){
    const row=$('row-'+jid); if(!row) return;
    const fill=row.querySelector('.jbar>div'), jm=row.querySelector('.jm');
    let d; try{const r=await fetch(`/api/job/${jid}?code=${encodeURIComponent(code())}`);d=await r.json();}
    catch(e){setTimeout(()=>pollJob(jid),2500);return;}
    if(!d.ok){jm.textContent='❌ '+d.error;return;}
    if(d.status==='queued'){const ahead=Math.max(0,(d.pos||1)-1);jm.textContent=ahead?`🕐 대기 중 — 앞에 ${ahead}개`:'🕐 곧 시작…';}
    else{if(fill)fill.style.width=(d.pct||5)+'%';jm.textContent='⏳ '+(d.msg||'작업 중…');}
    if(d.status==='error'){jm.textContent='❌ '+d.error;return;}
    if(d.status==='done'){if(fill)fill.style.width='100%';renderResultJ(d.result,row);return;}
    setTimeout(()=>pollJob(jid),1300);
  }
  function renderResultJ(d,row){
    if(d&&d.zip&&!d.pack){   // 대본 ZIP 작업 결과(팩이 아님) — 짤/카드 팩은 pack 키가 있음
      if(row){row.querySelector('.jm').innerHTML=`✅ 대본 ${d.ok}/${d.count}개 추출 완료 — <a href="${esch(d.zip)}" style="color:var(--gold);font-weight:800">⬇ ZIP 다운로드</a>`;}
      return;
    }
    if(row){row.querySelector('.jm').innerHTML=`✅ 완성 — <a href="/packs/${encodeURIComponent(d.pack)}/review.html" target="_blank" style="color:var(--gold);font-weight:700">미리보기 ↗</a>`;}
    const box=$('jresult'); if(!box) return;
    const imgs=(d.thumbs&&d.thumbs.length?d.thumbs:(d.cards||[])).slice(0,3);
    const isCard=!(d.thumbs&&d.thumbs.length);
    const thumbs=imgs.map((t,i)=>`<div style="flex:1"><img src="${t}" style="width:100%;border-radius:10px;border:2px solid ${i===0?'var(--gold)':'var(--line)'};display:block"><div style="text-align:center;font-size:11px;color:var(--faint);margin-top:4px">${isCard?(i+1)+'번째':(i===0?'대표':'후보 '+(i+1))}</div></div>`).join('');
    const div=document.createElement('div');
    div.style.cssText='background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px';
    div.innerHTML=`<div style="font-weight:800;margin-bottom:10px">✅ 완성팩 생성됨</div>
      <div style="display:flex;gap:8px">${thumbs}</div>
      ${d.skip?`<div style="margin-top:9px;color:var(--pend);font-size:12px">⚠️ ${esch(d.skip_reason)}</div>`:''}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <a class="btn" href="/packs/${encodeURIComponent(d.pack)}/review.html" target="_blank" style="text-decoration:none">🔎 검수 미리보기</a>
        <button class="btn primary" onclick="gotoTab('result')">📦 결과물에서 편집·업로드</button></div>`;
    box.prepend(div);
  }
  function gotoTab(t){setActive(t);}

  /* ============ 스레드 (Threads 소재 헌터) ============ */
  let THF={topic:'',region:'KR',product:'',link:'',lang:'ko',extra:''};
  let THCANDS=[], THBASKET=[], THLAST=null, THINBOX=[];
  function renderThread(){
    $('view').innerHTML=`
    <div class="view">
      <aside class="side">
        <div class="step"><div class="sh"><span class="num">1</span><span class="st">주제로 발굴</span><span class="sd">틱톡·유튜브</span></div>
          <input class="in" id="thTopic" placeholder="주제 (예: 홈트 허리라인)" value="${esch(THF.topic)}" oninput="THF.topic=this.value">
          <div style="display:flex;gap:8px;margin-top:8px">

  function thTikOpen(kind){
    const t=(THF.topic||'').trim(), rg=THF.region, e=encodeURIComponent(t||'shorts');
    const u = kind==='search' ? 'https://www.tiktok.com/search/video?q='+e
      : kind==='cc' ? 'https://ads.tiktok.com/business/creativecenter/inspiration/popular/hashtag/pc/en?region='+rg
      : 'https://ads.tiktok.com/business/creativecenter/inspiration/popular/pc/en?region='+rg;
    window.open(u,'_blank');
  }
  function thViews(n){n=n||0;if(n>=10000)return Math.round(n/1000)/10+'만';if(n>=1000)return Math.round(n/100)/10+'천';return String(n);}
  async function thSearch(){
    const t=(THF.topic||'').trim();
    if(!t){flash('주제를 먼저 입력하세요');return;}
    if(!code()){flash('접속코드를 입력하세요');return;}
    $('thStatus').textContent='🎬 유튜브에서 인기 쇼츠 찾는 중...';
    let d; try{d=await apiJson('/api/youtube/search',{code:code(),query:t,count:30});}catch(e){$('thStatus').textContent='❌ 통신 오류';return;}
    if(!d.ok){$('thStatus').textContent='❌ '+d.error;return;}
    THCANDS=d.items||[];
    $('thStatus').textContent=THCANDS.length?('후보 '+THCANDS.length+'개 — 눌러서 소재로 담기'):'결과가 없어요';
    thRenderGrid();
  }
  function thRenderGrid(){
    const g=$('thGrid'); if(!g)return;
    if(!THCANDS.length){g.innerHTML='<div class="caphint">주제 입력 후 🎬 유튜브 자동 또는 틱톡 버튼으로 소재를 찾으세요.</div>';return;}
    g.innerHTML=THCANDS.map((c,i)=>{
      const on=THBASKET.some(b=>b.url===c.url);
      return `<div class="thcard${on?' on':''}" onclick="thToggle(${i})">
        <div class="thpick">${on?'✓':'+'}</div>
        <a class="thopen" href="${c.url}" target="_blank" onclick="event.stopPropagation()">▶</a>
        ${c.thumb?`<img src="${c.thumb}" loading="lazy" onerror="this.remove()">`:''}
        <div class="thci"><div class="thct">${esch(c.title)}</div>
        <div class="thcm">${esch(c.channel)} · ${thViews(c.views)}</div></div></div>`;
    }).join('');
  }
  function thToggle(i){const c=THCANDS[i],at=THBASKET.findIndex(b=>b.url===c.url);
    if(at>=0)THBASKET.splice(at,1); else THBASKET.push({url:c.url,title:c.title,channel:c.channel});
    thRenderGrid(); thRenderBasket();}
  function thAddUrl(){const el=$('thUrl'),u=(el.value||'').trim();if(!u)return;
    THBASKET.push({url:u,title:'(붙여넣은 소재)',channel:''});el.value='';thRenderBasket();thRenderGrid();}
  function thRenderBasket(){const b=$('thBasket');if(!b)return;
    b.innerHTML=THBASKET.length?THBASKET.map((x,i)=>`<span class="thchip">${esch((x.title||x.url).slice(0,24))}<b onclick="thRm(${i})">✕</b></span>`).join(''):'<div class="caphint">담긴 소재 없음</div>';}
  function thRm(i){THBASKET.splice(i,1);thRenderBasket();thRenderGrid();}
  async function thMake(){
    if(!THBASKET.length){flash('소재를 1개 이상 담아주세요');return;}
    if(!code()){flash('접속코드를 입력하세요');return;}
    const srcs=THBASKET.map((b,i)=>`${i+1}. ${b.title||''} (${b.channel||''}) ${b.url}`).join('\n');
    $('thStatus').textContent='✨ 스레드 쓰는 중... (10~20초)';
    let d; try{d=await apiJson('/api/hunt/thread',{code:code(),sources:srcs,product:(THF.product||'').trim(),lang:THF.lang,extra:(THF.extra||'').trim()});}catch(e){$('thStatus').textContent='❌ 통신 오류';return;}
    if(!d.ok){$('thStatus').textContent='❌ '+d.error;return;}
    $('thStatus').textContent='';THLAST={title:d.title,part1:d.part1,part2:d.part2};thRenderOut();

  function thLink2(){const l=(THF.link||'').trim();return l?('\n'+l):'';}
  function thRenderOut(){
    const o=$('thOut'); if(!o)return;
    if(!THLAST){o.innerHTML='';return;}
    const p2=THLAST.part2+thLink2();
    o.innerHTML=`
      <div class="thout"><div class="thlbl">1편 (후킹) · 1/2</div>
        <textarea class="in" id="thP1" style="min-height:110px">${esch(THLAST.part1)}</textarea>

  function thCp(id){const t=$(id);if(!t)return;navigator.clipboard.writeText(t.value).then(()=>flash('📋 복사됐어요'));}
  async function thSave(){
    if(!THLAST)return;
    const item={title:THLAST.title,part1:$('thP1')?$('thP1').value:THLAST.part1,part2:$('thP2')?$('thP2').value:THLAST.part2,product:(THF.product||'').trim(),link:''};
    let d; try{d=await apiJson('/api/hunt/save',{code:code(),item});}catch(e){flash('❌ 통신 오류');return;}
    if(!d.ok){flash('❌ '+d.error);return;}
    flash('✅ 인박스에 저장됨');thLoadInbox();
  }
  async function thLoadInbox(){
    const box=$('thInbox'); if(!box)return;
    if(!code()){box.innerHTML='<div class="caphint">접속코드를 입력하면 인박스가 보여요</div>';return;}
    let d; try{d=await apiJson('/api/hunt/inbox',{code:code()});}catch(e){return;}
    if(!d.ok)return; THINBOX=d.items||[];
    box.innerHTML=THINBOX.length?THINBOX.map((x,i)=>`
      <div class="thibx"><div class="thibt">${esch(x.title||'(제목 없음)')}</div>
      ${x.product?`<div class="caphint">제품: ${esch(x.product)}</div>`:''}
      <pre class="thpre">${esch(x.part1||'')}</pre>
      <pre class="thpre">${esch(x.part2||'')}</pre>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" onclick="thCpI(${i},1)">📋 1편</button>

        <button class="btn" onclick="thDelI(${i})">🗑 삭제</button></div></div>`).join(''):'<div class="caphint">아직 저장된 스레드가 없어요. 위에서 만들어 저장하면 여기 쌓여요.</div>';
  }
  function thCpI(i,w){const x=THINBOX[i];if(!x)return;navigator.clipboard.writeText(w===1?(x.part1||''):(x.part2||'')).then(()=>flash('📋 복사됐어요'));}
  async function thDelI(i){const x=THINBOX[i];if(!x)return;if(!confirm('이 스레드를 삭제할까요?'))return;await apiJson('/api/hunt/del',{code:code(),id:x.id});thLoadInbox();}

  /* ============ 릴스(자동 쇼츠 제작) - 단계별 위저드 ============ */
  let arState={token:null,fname:'',pid:null};   // v1 상태(후속 단계에서 재사용)
  const WIZ_STEPS=[['learn','① 학습·소재'],['script','② 대본'],['clips','③ 영상'],['tts','④ 음성'],['subs','⑤ 자막'],['edit','⑥ 컷'],['bgm','⑦ BGM']];
  let wiz={step:'learn'};
  function wizIdx(s){return WIZ_STEPS.findIndex(x=>x[0]===s);}
  function renderAutoReel(){
    if(!wiz._restored){wiz._restored=true;wizRestore();}
    $('view').innerHTML=`
    <div class="view" style="flex-direction:column">
      <div class="wizbar">${WIZ_STEPS.map((s,i)=>`<span class="wizstep ${s[0]===wiz.step?'on':(wizIdx(s[0])<wizIdx(wiz.step)?'done':'')}" style="cursor:pointer" onclick="wizGo('${s[0]}')">${s[1]}</span>${i<WIZ_STEPS.length-1?'<span class="wizsep">›</span>':''}`).join('')}
        <button class="btn" style="margin-left:auto" onclick="wizProjects()">📂 내 프로젝트</button>${wiz.pid?'<button class="btn" onclick="wizNew()">＋ 새로</button>':''}</div>
      <div id="wizbody" class="mainpane" style="width:100%"></div>
    </div>`;
    renderWizStep();
  }
  function wizGo(s){
    const dir=wizIdx(s)>=wizIdx(wiz.step)?1:-1, prev=wiz.step;
    wiz.step=s; wizSave();
    const bar=document.querySelector('.wizbar'), body=$('wizbody');
    if(prev!==s && bar && body){
      // 상단 진행바는 고정한 채 하이라이트만 갱신, 내용(wizbody)만 좌우 슬라이드
      document.querySelectorAll('.wizbar .wizstep').forEach((el,i)=>{
        el.classList.toggle('on',WIZ_STEPS[i]&&WIZ_STEPS[i][0]===s);
        el.classList.toggle('done',WIZ_STEPS[i]&&wizIdx(WIZ_STEPS[i][0])<wizIdx(s));
      });
      slideEl(body,renderWizStep,dir);
    } else { renderAutoReel(); }
  }
  function wizSave(){try{localStorage.setItem('reelwiz',JSON.stringify({pid:wiz.pid||'',step:wiz.step,acct:wiz.acct||''}));}catch(_){}}
  function wizAcctPaint(){
    const sel=$('acctPickSel'); if(!sel)return;
    sel.innerHTML='<option value="">미지정 — 채널을 선택하세요</option>'
      +ACCTS.map(a=>`<option value="${esch(a)}" ${wiz.acct===a?'selected':''}>@${esch(a)}</option>`).join('');
  }
  function wizAcctPick(a){
    wiz.acct=a||''; wizSave(); wizAcctPaint(); wizAcctPush();
    flash(a?('📤 올릴 채널: @'+a):'올릴 채널 미지정');
  }
  function wizAcctPush(){   // 프로젝트가 있으면 서버(워터마크 계정)에도 반영
    if(!wiz.pid)return;
    const ad=(wiz._wm&&wiz._wm.ad)||false;
    wiz._wm={account:wiz.acct||'',ad};
    apiJson('/api/reelproj/subs_style',{code:code(),pid:wiz.pid,wm:wiz._wm}).catch(()=>{});
  }
  function wizRestore(){
    let s;try{s=JSON.parse(localStorage.getItem('reelwiz')||'{}');}catch(_){return;}
    if(!s.pid||!code())return;
    apiJson('/api/reelproj/state',{code:code(),pid:s.pid}).then(d=>{
      if(d&&d.ok){wiz.pid=s.pid;wiz.script=d.script;wiz.topic=d.topic;wiz.category=d.category;wiz.step=s.step||wiz.step;wiz.acct=s.acct||((d.wm||{}).account||'');renderAutoReel();}
    }).catch(()=>{});
  }
  function wizNew(){wiz={step:'learn',_restored:true};wizSave();renderAutoReel();}
  function wizPrev(){const i=wizIdx(wiz.step);if(i>0)wizGo(WIZ_STEPS[i-1][0]);}
  function wizProjects(){
    const b=$('wizbody'); if(!b)return;
    apiJson('/api/reelproj/list',{code:code()}).then(d=>{
      if(!d.ok){flash('❌ '+d.error);return;}
      const ps=d.projects||[];
      b.innerHTML=`<div class="panehead"><h2>📂 내 프로젝트</h2><span class="n">이어서 작업할 프로젝트를 고르세요 (자동 저장됨)</span></div>`+
        (ps.length?('<div class="catgrid">'+ps.map(p=>{
          const done=[p.n_clips?('영상'+p.n_clips):'',p.has_tts?'음성':'',p.has_edit?'컷':'',p.has_final?'완성✓':''].filter(Boolean).join(' · ')||'대본만';
          return `<div class="catcard"><div class="cbody"><div class="cnm">${esch(p.topic||'(제목없음)')}</div>
            <div style="font-size:11.5px;color:var(--gold);margin:4px 0">${esch(p.category||'')} · ${done}</div>
            <div style="font-size:11px;color:var(--faint)">${esch((p.updated||'').replace('T',' '))}</div></div>
            <div class="cacts"><button class="btn primary" style="flex:1" onclick="wizOpen('${p.pid}')">이어하기</button><button class="btn collmini" onclick="wizDelProj('${p.pid}')" title="삭제">🗑</button></div></div>`;
        }).join('')+'</div>'):'<div class="lcard" style="color:var(--faint)">저장된 프로젝트가 없어요. ① 학습부터 시작하세요.</div>')+
        `<div style="margin-top:12px"><button class="btn" onclick="renderAutoReel()">← 돌아가기</button></div>`;
    });
  }
  function wizOpen(pid){
    apiJson('/api/reelproj/state',{code:code(),pid}).then(d=>{
      if(!d.ok){flash('❌ '+d.error);return;}
      wiz.pid=pid;wiz.script=d.script;wiz.topic=d.topic;wiz.category=d.category;wiz.acct=((d.wm||{}).account)||wiz.acct||'';
      wiz.step=d.final?'bgm':(d.edit?'edit':(d.tts?'subs':'clips'));
      wizSave();renderAutoReel();flash('📂 프로젝트 이어가기');
    });
  }
  function wizDelProj(pid){
    if(!confirm('이 프로젝트를 삭제할까요? (되돌릴 수 없음)'))return;
    apiJson('/api/reelproj/delete',{code:code(),pid}).then(d=>{if(d.ok){if(wiz.pid===pid){wiz.pid=null;wizSave();}wizProjects();}});
  }
  function renderWizStep(){
    const b=$('wizbody'); if(!b)return;
    if(wiz.step==='learn')return renderLearnStep(b);
    if(wiz.step==='script')return renderScriptStep(b);
    if(wiz.step==='clips')return renderClipsStep(b);
    if(wiz.step==='tts')return renderTtsStep(b);
    if(wiz.step==='subs')return renderSubsStep(b);
    if(wiz.step==='edit')return renderEditStep(b);
    if(wiz.step==='bgm')return renderBgmStep(b);
    b.innerHTML=`<div class="panehead"><h2>${WIZ_STEPS[wizIdx(wiz.step)][1]}</h2></div>`;
  }
  /* ===== ② 대본 생성 ===== */
  async function renderScriptStep(b){
    if(!learnState.cats.length){try{const d=await apiJson('/api/learn/summary',{code:code()});if(d.ok)learnState.cats=d.categories||[];}catch(e){}}
    const cats=learnState.cats||[];
    b.innerHTML=`
      <div class="panehead"><h2>② 대본 생성</h2><span class="n">학습된 스타일로 소재에 맞는 대본을 3가지 버전으로</span></div>
      <div class="lcard">
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <select class="in" id="gsCat" style="max-width:180px">${cats.map(c=>`<option>${esch(c.name)}</option>`).join('')}</select>
          <input class="in" id="gsTopic" style="flex:1;min-width:220px" placeholder="소재/주제 (예: 발라도 안 끈적이는 스틱 선크림)">
          <button class="btn primary" onclick="gsGen()">✍️ 대본 3개 생성</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:8px;flex-wrap:wrap">
          <span style="font-size:12.5px;color:var(--muted)">🎚 톤 강도</span>
          <select class="in" id="gsTone" style="max-width:150px"><option value="mild">담백하게</option><option value="basic" selected>기본(학습 톤)</option><option value="strong">강하게</option></select>
          <span style="font-size:11.5px;color:var(--faint)">학습 톤이 과하면 '담백하게'</span>
        </div>
        <div class="caphint" style="margin-top:8px">💡 네이버 트렌드 소재추천은 API 키 확인 후 붙습니다. 지금은 소재를 <b>직접 입력</b>하세요.</div>
      </div>
      <div id="gsOut">${cats.length?'':'<div class="caphint">먼저 <b>① 학습·소재</b>에서 대본을 학습하세요(스타일이 있어야 생성 가능).</div>'}</div>
      <div id="gsEdit"></div>`;
    if(wiz._pendingCat && $('gsCat')){[...$('gsCat').options].some(o=>{if(o.value===wiz._pendingCat){$('gsCat').value=wiz._pendingCat;return true;}});}

    wiz._pendingTopic=null; wiz._pendingCat=null;
    if(wiz.script){$('gsEdit').innerHTML=gsEditHtml(wiz.script);}
  }
  function gsGen(){
    const cat=($('gsCat')&&$('gsCat').value)||'', topic=($('gsTopic')&&$('gsTopic').value.trim())||'';
    if(!cat){flash('학습된 스타일이 없어요 (① 단계에서 학습)');return;}
    if(!topic){flash('소재를 입력하세요');return;}
    const tone=($('gsTone')&&$('gsTone').value)||'basic';

  function subApply(){
    const file=$('sfFont').value, f=subState.fonts.find(x=>x.file===file);
    const family=f?f.family:'Malgun Gothic';
    const size=+$('sfSize').value, primary=$('sfPrimary').value, outline=$('sfOutline').value, ow=+$('sfOw').value, bold=$('sfBold').checked, pop=$('sfPop').checked, al=subState._al||2;
    subState.style={family,font_file:file,size,primary,outline,outline_w:ow,align:al,bold,pop,margin_v:al===8?580:(al===2?700:0)};
    $('sfSizeV').textContent=size+'px';
    const box=$('sfPrev'), t=$('sfPrevText'); if(!box||!t)return;
    const paint=()=>{
      const scale=(box.clientHeight||680)/1920;   // 실측 높이 기준(1920 캔버스 대비)
      t.style.fontFamily=`'${family}', 'Malgun Gothic', sans-serif`;
      t.style.fontSize=Math.max(10,size*scale)+'px';
      t.style.color=primary;
      // ASS 외곽(글자 바깥) 느낌: 획을 글자 뒤로(paint-order) + 실제 두께에 맞춤
      t.style.paintOrder='stroke fill';
      // CSS stroke는 안팎 절반씩 + 글자가 안쪽을 덮어 체감 절반 → 실제(ASS, 바깥 전체) 느낌에 맞게 2배 보정
      t.style.webkitTextStroke=ow>0?((ow*scale*2).toFixed(2)+'px '+outline):'0';
      t.style.fontWeight=bold?'800':'400';
      t.style.top=al===8?'30%':(al===5?'44%':'auto');
      t.style.bottom=al===2?'34%':'auto';
      t.style.transformOrigin='center';
      t.style.animation=pop?'subpop 1.6s ease-in-out infinite':'none';
    };
    paint();
    requestAnimationFrame(paint);   // 레이아웃 확정 후 재측정(초기 clientHeight 0 방지)
    subAutosave();                  // 바꾼 스타일 자동 저장(⑥ 생성/재입힘이 항상 최신 반영)

    }
  }

    ov.innerHTML=`<div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;max-height:94vh;overflow:auto">
      <div style="font-weight:800;margin-bottom:4px;font-size:16px">🌫 컷 ${i+1} 블러 영역 <span id="blurCnt" style="font-size:12px;color:var(--gold)"></span></div>

      <div id="blurCanvas" style="position:relative;height:min(76vh,660px);aspect-ratio:9/16;max-width:92vw;background:#000;overflow:hidden;cursor:crosshair;margin:0 auto;user-select:none;border-radius:10px">
        <img src="${bl.thumb}?t=${Date.now()}" style="width:100%;height:100%;object-fit:cover;pointer-events:none" draggable="false">
        <div id="blurRect" style="position:absolute;border:2px dashed #ff4d6d;background:rgba(255,77,109,.18);display:none;pointer-events:none"></div></div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap">
        <button class="btn" onclick="blurResetSel()">↺ 영역 초기화</button>
        <button class="btn" onclick="blurClear()">🚫 블러 제거</button>
        <button class="btn" onclick="blurClose()">닫기</button>
        <button class="btn primary" onclick="blurApply()">적용</button></div></div>`;
    document.body.appendChild(ov);
    const cv=$('blurCanvas'), rect=$('blurRect'); let sx,sy,drawing=false,cur=null;
    cv.onmousedown=e=>{const r=cv.getBoundingClientRect();sx=e.clientX-r.left;sy=e.clientY-r.top;drawing=true;cur=null;rect.style.display='block';rect.style.left=sx+'px';rect.style.top=sy+'px';rect.style.width='0px';rect.style.height='0px';};
    cv.onmousemove=e=>{if(!drawing)return;const r=cv.getBoundingClientRect();const cx=Math.max(0,Math.min(r.width,e.clientX-r.left)),cy=Math.max(0,Math.min(r.height,e.clientY-r.top));const x=Math.min(sx,cx),y=Math.min(sy,cy),w=Math.abs(cx-sx),h=Math.abs(cy-sy);rect.style.left=x+'px';rect.style.top=y+'px';rect.style.width=w+'px';rect.style.height=h+'px';cur={x:x/r.width,y:y/r.height,w:w/r.width,h:h/r.height};};
    window.onmouseup=()=>{
      if(!drawing)return; drawing=false; rect.style.display='none';
      if(cur&&cur.w>=0.03&&cur.h>=0.03&&blurState.boxes.length<8){

  }
  function blurAddRect(b){

  }
  function blurCnt(){const el=$('blurCnt');if(el)el.textContent=blurState.boxes.length?('· '+blurState.boxes.length+'개 영역'):'';}
  function blurClose(){const o=$('blurOv');if(o)o.remove();window.onmouseup=null;}
  function blurResetSel(){blurState.boxes=[];document.querySelectorAll('#blurCanvas .blurbox').forEach(x=>x.remove());blurCnt();flash('영역을 모두 지웠어요 · 다시 드래그하세요');}

  function bgmLoad(){

  function catEmoji(name){
    const n=String(name||'');
    if(/쇼핑|제품|상품|템|추천|리뷰|판매|가성비/.test(n))return '🛍️';
    if(/유머|웃|개그|밈|드립/.test(n))return '😂';
    if(/이슈|시사|화제|뉴스|논란/.test(n))return '🔥';
    if(/썰|경험|사연|이야기|스토리/.test(n))return '💬';
    if(/정보|팁|꿀팁|지식|하우투|방법/.test(n))return '💡';
    if(/뷰티|화장|메이크업|코스메틱/.test(n))return '💄';
    if(/음식|요리|맛집|먹|레시피/.test(n))return '🍜';
    if(/여행|브이로그|일상|데일리/.test(n))return '🎬';
    if(/운동|헬스|건강|다이어트/.test(n))return '💪';
    if(/돈|재테크|투자|부업|수익/.test(n))return '💰';
    if(/패션|옷|코디|스타일/.test(n))return '👗';
    if(/감성|힐링|위로|명언/.test(n))return '🌿';
    return '📄';
  }

  async function learnPoll(jid){
    const row=$('lj-'+jid); if(!row)return;
    const fill=row.querySelector('.jbar>div'),jm=row.querySelector('.jm');
    let d;try{const r=await fetch(`/api/job/${jid}?code=${encodeURIComponent(code())}`);d=await r.json();}catch(e){setTimeout(()=>learnPoll(jid),2500);return;}
    if(!d.ok){jm.textContent='❌ '+d.error;return;}
    if(d.status==='queued')jm.textContent='🕐 대기 중…';
    else{if(fill)fill.style.width=(d.pct||8)+'%';jm.textContent='⏳ '+(d.msg||'학습 중…');}
    if(d.status==='error'){jm.textContent='❌ '+d.error;return;}
    if(d.status==='done'){if(fill)fill.style.width='100%';jm.textContent='✅ '+(d.msg||'완료');learnRefresh();return;}
    setTimeout(()=>learnPoll(jid),1500);

  // 업로드 전 이미지 축소(전송량↓, 서버/프록시 크기제한·타임아웃 회피). PDF는 원본 그대로.
  function refToDataURL(file, maxDim){
    return new Promise((res,rej)=>{
      const isPdf=file.type==='application/pdf'||/\.pdf$/i.test(file.name||'');
      const rd=new FileReader();
      rd.onerror=()=>rej(new Error('파일 읽기 실패'));
      if(isPdf){rd.onload=()=>res(rd.result);rd.readAsDataURL(file);return;}
      rd.onload=()=>{const img=new Image();
        img.onload=()=>{try{
          const s=Math.min(1,maxDim/Math.max(img.width,img.height)||1);
          const w=Math.max(1,Math.round(img.width*s)),h=Math.max(1,Math.round(img.height*s));
          const cv=document.createElement('canvas');cv.width=w;cv.height=h;
          cv.getContext('2d').drawImage(img,0,0,w,h);
          res(cv.toDataURL('image/jpeg',0.82));
        }catch(err){rej(err);}};
        img.onerror=()=>rej(new Error('이미지 디코딩 실패'));
        img.src=rd.result;};
      rd.readAsDataURL(file);
    });
  }

  function bulkInitCal(){

  function renderBulkCal(){
    const cal=$('bulkcal'); if(!cal)return;
    const y=BULK.vY, m=BULK.vM;
    const start=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
    const t=new Date(), isT=d=>y===t.getFullYear()&&m===t.getMonth()&&d===t.getDate();
    const tk=t.getFullYear()*10000+t.getMonth()*100+t.getDate();
    const isPast=d=>(y*10000+m*100+d)<tk;
    const sp=(BULK.date||'').split('-').map(Number);
    const isSel=d=>(sp[0]===y&&sp[1]-1===m&&sp[2]===d);
    let cells=''; for(let i=0;i<start;i++)cells+='<span></span>';

  function bulkFmtWhen(dt){const ap=dt.getHours()>=12?'오후':'오전';let h=dt.getHours()%12;if(h===0)h=12;
    return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')} ${ap} ${h}:${String(dt.getMinutes()).padStart(2,'0')}`;}
  function bulkSlots(count){
    if(!BULK.date||!BULK.times.length) return [];
    const [Y,M,D]=BULK.date.split('-').map(Number);
    const times=[...BULK.times].sort((a,b)=>(a.h*60+a.m)-(b.h*60+b.m));
    const out=[]; const nowSec=Math.floor(Date.now()/1000)+60;
    for(let day=0; day<400 && out.length<count; day++){
      for(const t of times){
        const dt=new Date(Y,M-1,D+day,t.h,t.m,0);
        const ts=Math.floor(dt.getTime()/1000);
        if(ts>nowSec){out.push({ts,when:bulkFmtWhen(dt)}); if(out.length>=count)break;}
      }
    }
    return out;
  }

    box.querySelectorAll('[data-src]').forEach(b=>b.onclick=()=>iePickSrc(b.dataset.src,list.find(x=>x.shortcode===b.dataset.src)));
    box.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{await apiJson('/api/ie/insta/collected_clear',{code:code(),shortcode:b.dataset.del});ieLoadCollected();});

  function ieUpdTrCount(){const el=$('trcount');if(el)el.textContent=IEB.trSel.size;}
  function ieTrSelectAll(){
    const all=IEB.shownReels||[];
    if(!all.length){flash('현재 목록에 릴스가 없어요 (위 필터를 🎬 릴스/전체로)');return;}
    const reels=all.slice(0,100);   // 대본추출 한 번에 최대 100개 → 최근순 100개만 선택
    const capped=all.length>100;
    const allOn=reels.every(sc=>IEB.trSel.has(sc));   // 이미 다 선택돼 있으면 해제 토글
    reels.forEach(sc=>{allOn?IEB.trSel.delete(sc):IEB.trSel.add(sc);});
    document.querySelectorAll('#ie_collected [data-tr]').forEach(cb=>{
      cb.checked=IEB.trSel.has(cb.dataset.tr);
      const w=cb.closest('.trpick'); if(w)w.classList.toggle('on',cb.checked);
    });
    ieUpdTrCount();
    flash(allOn?'전체 해제됨':(capped?`최근 100개 선택됨 (전체 ${all.length}개 중, 한 번에 최대 100)`:`릴스 ${reels.length}개 전체 선택됨`));
  }

  function setUp(f){rUp=f;paintRail();paintGrid();}

  // 결과물 분류: 일본어/영어 먼저(수출), 그다음 소재/종류로. 레거시(source 없음) 폴백 포함
  function pkind(p){
    const s=p.source||'';
    if(s==='autoshort'||p.template==='reel'||p.type==='reel') return 'reel';
    if(p.lang==='ja'||p.story) return 'jp';
    if(p.lang==='en') return 'en';
    if(s==='youtube'||p.template==='youtube') return 'yt';
    if(s==='foreign'||s==='insta_import') return 'import';
    if(p.type==='cardnews'||s==='cardnews') return 'card';
    return 'community';   // community + 레거시 짤
  }
  const KINDS=[['reel','🎬','자동쇼츠'],['yt','▶️','유튜브 짤'],['community','🗨','커뮤니티 짤'],['jp','🇯🇵','일본 수출'],['en','🇺🇸','영어 수출'],['import','🇰🇷','한글 수입'],['card','🗂','카드뉴스']];
  function paintRail(){
    const nUp=PACKS.filter(p=>p.published).length, nNo=PACKS.length-nUp;

    const L=(on,f,fn,ic,lab,c)=>`<div class="rlink ${on?'on':''}" onclick="${fn}('${f}')"><span class="ic">${ic}</span> ${lab} <span class="c">${c||0}</span></div>`;

      <div><p class="rlabel">종류</p>
        ${L(rKind==='all','all','setKind','▦','전체',PACKS.length)}
        ${KINDS.map(([k,ic,lab])=>L(rKind===k,k,'setKind',ic,lab,cnt[k])).join('')}</div>`;
  }

  function cardConvInit(){
    carChannelsLoad();
    apiJson('/api/packs',{code:code()}).then(d=>{
      const sel=$('carPack'); if(!sel||!d.ok)return;

      sel.innerHTML=reels.length?reels.map(p=>`<option value="${esch(p.name)}">${esch(p.title||p.name)}</option>`).join('')
        :'<option value="">릴스 완성팩이 없어요 (제작소→릴스에서 먼저 제작)</option>';
      if(window._carPackPre){sel.value=window._carPackPre;window._carPackPre='';}

  function carAcctSync(){   // 결과물탭(릴스 모달)에서 그 팩에 지정한 계정을 자동 반영
    const pk=($('carPack')&&$('carPack').value)||'';
    const sel=$('carAcct'); if(!sel)return;
    let v='';
    try{const kv=localStorage.getItem('rpacct_'+pk);
      if(kv&&[...sel.options].some(o=>o.value===kv))v=kv;}catch(e){}

  function carChannelsLoad(){

        (d.styles||[]).forEach(s=>{const o=document.createElement('option');o.value=s.key;

        (d.channels||[]).forEach(c=>{const o=document.createElement('option');o.value=c.name;
          o.textContent=c.name+' ('+c.count+'개 수집됨)';ch.appendChild(o);});}

  async function carPoll(jid,onDone){
    let d; try{const r=await fetch(`/api/job/${jid}?code=${encodeURIComponent(code())}`);d=await r.json();}
    catch(e){setTimeout(()=>carPoll(jid,onDone),2500);return;}
    const m=$('carMsg'); if(!m)return;
    if(!d.ok){m.textContent='❌ '+(d.error||'작업 조회 실패');return;}
    if(d.status==='error'){m.textContent='❌ '+(d.error||'실패');const g=$('carGo');if(g)g.disabled=false;return;}
    if(d.status==='done'){onDone(d.result||{});return;}
    m.textContent='⏳ '+(d.msg||'작업 중…');
    setTimeout(()=>carPoll(jid,onDone),2000);
  }
  function carLearn(){
    const ch=($('carCh')&&$('carCh').value)||'';
    if(!ch){flash('수집한 캐러셀 계정을 고르세요');return;}
    if($('carMsg'))$('carMsg').textContent='📚 카드 이미지 읽는 중…';
    apiJson('/api/carousel/learn',{code:code(),channel:ch}).then(d=>{
      if(!d.ok){if($('carMsg'))$('carMsg').textContent='❌ '+d.error;return;}
      carPoll(d.job,r=>{
        if($('carMsg'))$('carMsg').textContent='✅ 학습 완료 ('+(r.cards_read||0)+'장) — 전개: '+(r.flow||'');
        carChannelsLoad();
      });
    }).catch(()=>{if($('carMsg'))$('carMsg').textContent='❌ 통신 오류';});
  }
  function carConvert(){
    const pack=($('carPack')&&$('carPack').value)||(PKR&&PKR.name)||'';
    if(!pack){flash('릴스 완성팩을 고르세요');return;}
    const g=$('carGo'); if(g)g.disabled=true;
    if($('carMsg'))$('carMsg').textContent='🃏 카드 구성 중…';
    apiJson('/api/pack/to_carousel',{code:code(),pack,
      style:($('carStyle')&&$('carStyle').value)||'',
      template:'photo',
      account:($('carAcct')&&$('carAcct').value)||''}).then(d=>{
      if(!d.ok){if($('carMsg'))$('carMsg').textContent='❌ '+d.error;if(g)g.disabled=false;return;}
      carPoll(d.job,r=>{
        if(g)g.disabled=false;
        if($('carMsg'))$('carMsg').textContent='✅ 완성 — 카드 '+(r.cards||0)+'장 → 결과물 탭에 저장됨';
        flash('✅ 카드뉴스 팩 생성: '+(r.pack||''));
        const o=$('carOv'); if(o)o.remove();
        const pv=$('carPreview');
        if(pv&&r.pack&&r.cards){
          const ts=Date.now();
          pv.innerHTML='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px">'
            +Array.from({length:r.cards},(_,i)=>`<img src="/packs/${encodeURIComponent(r.pack)}/${String(i+1).padStart(2,'0')}.jpg?${ts}" loading="lazy" style="width:100%;border-radius:10px;border:1px solid var(--line)">`).join('')
            +'</div>';

      });
    }).catch(()=>{if($('carMsg'))$('carMsg').textContent='❌ 통신 오류';if(g)g.disabled=false;});
  }

  /* ---- drag reorder (삽입 위치 라인 표시) ---- */
  let dragI=null;
  function clearIns(){[...$('strip').children].forEach(c=>c.classList.remove('ins-top','ins-bot'));}
  function gapIndex(strip,y){
    const items=[...strip.children];
    for(let i=0;i<items.length;i++){const r=items[i].getBoundingClientRect();if(y<r.top+r.height/2)return i;}
    return items.length;
  }
  function showIns(strip,gap){
    const items=[...strip.children]; clearIns();
    if(gap>=items.length){ if(items.length) items[items.length-1].classList.add('ins-bot'); }
    else items[gap].classList.add('ins-top');
  }
  function bindDrag(){
    const strip=$('strip');
    [...strip.children].forEach(el=>{
      el.addEventListener('dragstart',e=>{dragI=+el.dataset.i;el.classList.add('drag');
        e.dataTransfer.effectAllowed='move';try{e.dataTransfer.setData('text/plain','');}catch(_){}});
      el.addEventListener('dragend',()=>{el.classList.remove('drag');clearIns();});
    });
    strip.ondragover=e=>{e.preventDefault();e.dataTransfer.dropEffect='move';showIns(strip,gapIndex(strip,e.clientY));};
    strip.ondragleave=e=>{ if(!strip.contains(e.relatedTarget)) clearIns(); };
    strip.ondrop=e=>{e.preventDefault();const gap=gapIndex(strip,e.clientY);clearIns();
      if(dragI===null)return;
      const moved=ORDER.splice(dragI,1)[0];
      let to=gap; if(dragI<gap)to=gap-1;
      ORDER.splice(to,0,moved); dragI=null; ORDERDIRTY=true; renderStrip(); renderTrack();};
  }

  /* ---- mosaic editor (실제 반영) ---- */
  let mosTarget=null,mosBoxes=[],mosDraw=null;
  function openMosaic(fn){
    if(!PK)return; mosTarget=fn; mosBoxes=[]; mosDraw=null;
    const bg=$('mosbg');
    bg.style.backgroundImage=`url("${packBase(PK.name)}/${mosTarget}?t=${TS}")`;
    bg.style.backgroundSize='cover'; bg.style.backgroundPosition='center';
    $('mosLabel').textContent='';

  }
  function mosSetup(){
    const bg=$('mosbg'),cv=$('moscv');
    cv.width=bg.clientWidth;cv.height=bg.clientHeight;mosRedraw();
    const pos=e=>{const r=cv.getBoundingClientRect();const t=(e.touches&&e.touches[0])||e;return{x:t.clientX-r.left,y:t.clientY-r.top};};
    cv.onpointerdown=e=>{const p=pos(e);mosDraw={x0:p.x,y0:p.y,x1:p.x,y1:p.y};cv.setPointerCapture(e.pointerId);};
    cv.onpointermove=e=>{if(!mosDraw)return;const p=pos(e);mosDraw.x1=p.x;mosDraw.y1=p.y;mosRedraw();};
    cv.onpointerup=()=>{if(!mosDraw)return;const b=mosDraw;mosDraw=null;
      const w=Math.abs(b.x1-b.x0),h=Math.abs(b.y1-b.y0);
      if(w>8&&h>8)mosBoxes.push({x:Math.min(b.x0,b.x1),y:Math.min(b.y0,b.y1),w,h});mosRedraw();};
  }
  function mosRedraw(){
    const cv=$('moscv'),ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);
    const draw=(x,y,w,h)=>{ctx.fillStyle='rgba(40,90,220,.42)';ctx.fillRect(x,y,w,h);ctx.strokeStyle='#6ea0ff';ctx.lineWidth=2;ctx.strokeRect(x,y,w,h);};
    mosBoxes.forEach(b=>draw(b.x,b.y,b.w,b.h));
    if(mosDraw){const b=mosDraw;draw(Math.min(b.x0,b.x1),Math.min(b.y0,b.y1),Math.abs(b.x1-b.x0),Math.abs(b.y1-b.y0));}
  }
  function mosClear(){mosBoxes=[];mosDraw=null;mosRedraw();}
  function closeMosaic(){$('mosov').classList.remove('open');}
  async function applyMosaic(){
    if(!mosBoxes.length){flash('가릴 부분을 드래그로 표시하세요');return;}
    const cv=$('moscv');
    const boxes=mosBoxes.map(b=>({x:b.x/cv.width,y:b.y/cv.height,w:b.w/cv.width,h:b.h/cv.height}));
    const d=await apiJson('/api/pack/mosaic',{code:code(),pack:PK.name,base:mosTarget,boxes});
    closeMosaic();
    if(!d.ok){flash('❌ '+d.error);return;}
    flash('🟦 블러 적용 완료'); reloadModal();
  }

      renderCal(); syncTimeUI(); showSeldt();}
    if($('sacctShow'))$('sacctShow').textContent='@'+(e.account||'');
    if($('scap'))$('scap').textContent='🕒 예약 시간만 변경합니다';
  }
  async function approveSched(id){const r=await apiJson('/api/schedule/approve',{code:code(),id});if(!r.ok){flash('❌ '+r.error);return;}flash('✅ 승인됨 — 예약 확정');loadSched();}
  async function rejectSched(id){if(!confirm('이 예약을 반려할까요?'))return;const r=await apiJson('/api/schedule/reject',{code:code(),id});if(!r.ok){flash('❌ '+r.error);return;}flash('🚫 반려됨');loadSched();}
  async function cancelSched(id){const r=await apiJson('/api/schedule/cancel',{code:code(),id});if(!r.ok){flash('❌ '+(r.error||'실패'));return;}flash('🗑 예약 취소됨');loadSched();}

  /* ============ 회원 관리 TAB (관리자 전용) ============ */
  let adminSec='members';
  function adminTab(s){adminSec=s;renderMembers();}
  function renderMembers(){
    if(!isAdmin()){$('view').innerHTML='<div class="view"><main class="mainpane"><div style="color:var(--danger);padding:24px">관리자 전용 화면입니다.</div></main></div>';return;}
    $('view').innerHTML=`<div class="view"><main class="mainpane">
      <div class="panehead"><h2>🛠 관리자</h2><span class="n">회원 · 업로드 계정 · 유튜브 API 키</span></div>
      <div class="chips" style="margin-bottom:18px">
        <span class="chip ${adminSec==='members'?'on':''}" onclick="adminTab('members')">👥 회원</span>
        <span class="chip ${adminSec==='ig'?'on':''}" onclick="adminTab('ig')">📸 업로드 계정</span>
        <span class="chip ${adminSec==='yt'?'on':''}" onclick="adminTab('yt')">🔑 유튜브 키</span></div>
      <div id="adminbody"></div></main></div>`;
    if(adminSec==='members'){$('adminbody').innerHTML='<div id="memberpanel"></div>';loadMembers();}
    else if(adminSec==='ig')loadIgAccounts();
    else loadYtKeys();
  }
  /* ---- 업로드 인스타 계정 관리 ---- */
  async function loadIgAccounts(){
    const box=$('adminbody'); if(!box)return;
    box.innerHTML='<div class="caphint" style="margin-bottom:12px">업로드(게시)용 인스타 계정입니다. <b>수집용 부계정과는 별개</b>예요. (이 PC엔 실제로 안 넣어도 기능만 확인 가능)</div>'
      +'<div id="iglist" style="color:var(--faint)">불러오는 중…</div>'
      +'<div style="background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:14px;display:flex;flex-direction:column;gap:8px">'
      +'<b style="font-size:13px">＋ 계정 추가</b>'
      +'<input id="ig_name" class="in" placeholder="계정 핸들 (예: sowho77)">'
      +'<input id="ig_uid" class="in" placeholder="IG user_id — 비워두면 토큰으로 자동 조회 (전화번호 아님!)">'
      +'<input id="ig_tok" class="in" placeholder="access_token (IGAA...)">'
      +'<button class="btn primary" onclick="addIgAccount()">저장</button>'
      +'<div class="caphint">user_id는 <b>17자리 숫자</b>예요. 모르면 <b>비워두고 토큰만</b> 넣으면 서버가 자동으로 받아옵니다.</div></div>';
    let d; try{d=await apiJson('/api/admin/ig/list',{code:code()});}catch(e){d={ok:false,error:'통신 오류'};}
    const lb=$('iglist'); if(!lb)return;
    if(!d.ok){lb.innerHTML='<span style="color:var(--danger)">❌ '+esch(d.error)+'</span>';return;}
    lb.innerHTML=(d.items||[]).map(a=>`<div class="hot" style="align-items:center">
      <div class="info"><div class="tt">📸 @${esch(a.name)}</div>
        <div class="mt" style="color:var(--muted)">${a.user_id?('ID '+esch(a.user_id)+' · '):''}${a.has_token?'토큰 있음':'<span style="color:var(--danger)">토큰 없음</span>'}${a.removable?'':' · config 직접설정'}</div></div>
      ${a.removable?`<button data-rmig="${esch(a.name)}">삭제</button>`:''}</div>`).join('')
      ||'<div style="color:var(--faint)">등록된 업로드 계정이 없어요.</div>';
    lb.querySelectorAll('[data-rmig]').forEach(b=>b.onclick=async()=>{
      if(!confirm('@'+b.dataset.rmig+' 계정을 삭제할까요?'))return;
      await apiJson('/api/admin/ig/remove',{code:code(),name:b.dataset.rmig});loadIgAccounts();loadAccounts();});
  }
  async function addIgAccount(){
    const name=($('ig_name')&&$('ig_name').value.trim())||'';
    if(!name){flash('계정 핸들을 입력하세요');return;}
    const r=await apiJson('/api/admin/ig/add',{code:code(),name,user_id:($('ig_uid')&&$('ig_uid').value.trim())||'',access_token:($('ig_tok')&&$('ig_tok').value.trim())||''});
    if(!r.ok){flash('❌ '+r.error);return;}
    flash(r.note?('✅ 계정 저장됨 — '+r.note):'✅ 계정 저장됨'); loadIgAccounts(); loadAccounts();
  }
  /* ---- 회원별 유튜브 API 키 ---- */
  async function loadYtKeys(){
    const box=$('adminbody'); if(!box)return;
    box.innerHTML='<div class="caphint" style="margin-bottom:12px">회원마다 유튜브 API 키를 등록합니다(여러 개 가능 = 구글계정 여러개). 인기 쇼츠 조회 시 그 회원 키를 사용하고 <b>사용량(추정)</b>을 집계해요. <span style="color:var(--faint)">※ 구글 공식 할당량이 아니라 우리 앱이 호출한 추정 유닛 · 일 1만 기준</span></div>'
      +'<div id="ytklist" style="color:var(--faint)">불러오는 중…</div>';
    let d; try{d=await apiJson('/api/admin/ytkeys/list',{code:code()});}catch(e){d={ok:false,error:'통신 오류'};}
    const lb=$('ytklist'); if(!lb)return;
    if(!d.ok){lb.innerHTML='<span style="color:var(--danger)">❌ '+esch(d.error)+'</span>';return;}
    const q=d.daily_quota||10000;
    lb.innerHTML=(d.members||[]).map(m=>{
      const keys=(m.keys||[]).map(k=>{
        const pct=Math.min(100,Math.round((k.units_today||0)/q*100));
        return `<div class="hot" style="align-items:center;margin:4px 0">
          <div class="info"><div class="tt">🔑 ${esch(k.label)} <span style="color:var(--faint);font-weight:400">…${esch(k.key_tail)}</span></div>
            <div class="mt" style="color:var(--muted)">오늘 ${(k.units_today||0).toLocaleString()} / ${q.toLocaleString()} (${pct}%) · 누적 ${(k.units_total||0).toLocaleString()}</div>
            <div style="height:6px;background:var(--panel2);border-radius:5px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${pct>85?'var(--danger)':'var(--gold)'}"></div></div></div>
          <button data-rmk="${esch(k.key_tail)}" data-mc="${esch(m.code)}">삭제</button></div>`;
      }).join('')||'<div style="color:var(--faint);font-size:12px;padding:4px 0">등록된 키 없음</div>';
      return `<div style="border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:12px;background:var(--panel)">
        <div style="font-weight:800;margin-bottom:6px">${m.role==='admin'?'👑':'🙂'} ${esch(m.name)} <code style="font-size:12px;color:var(--faint)">${esch(m.code)}</code></div>
        ${keys}
        <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
          <input class="in" id="ytk_label_${esch(m.code)}" placeholder="라벨(구글계정명)" style="width:130px">
          <input class="in" id="ytk_key_${esch(m.code)}" placeholder="AIza... API 키" style="flex:1;min-width:160px">
          <button class="btn" onclick="addYtKey('${esch(m.code)}')">＋키 추가</button></div></div>`;
    }).join('')||'<div style="color:var(--faint)">회원이 없어요.</div>';
    lb.querySelectorAll('[data-rmk]').forEach(b=>b.onclick=async()=>{
      if(!confirm('이 키를 삭제할까요?'))return;
      await apiJson('/api/admin/ytkeys/remove',{code:code(),member:b.dataset.mc,key_tail:b.dataset.rmk});loadYtKeys();});
  }
  async function addYtKey(mc){
    const key=($('ytk_key_'+mc)&&$('ytk_key_'+mc).value.trim())||'';
    const label=($('ytk_label_'+mc)&&$('ytk_label_'+mc).value.trim())||'';
    if(!key){flash('API 키를 입력하세요');return;}
    const r=await apiJson('/api/admin/ytkeys/add',{code:code(),member:mc,key,label});
    if(!r.ok){flash('❌ '+r.error);return;}
    flash('✅ 키 추가됨'); loadYtKeys();
  }
  async function loadMembers(){
    const box=$('memberpanel'); if(!box)return;
    if(!isAdmin()){box.style.display='none';return;}
    box.style.display='';
    box.innerHTML=''
      +'<div class="caphint" style="margin-bottom:12px">회원코드는 숫자 4자리. 일반 회원은 <b>예약만</b> 가능하고, 관리자는 즉시 업로드까지 가능합니다.</div>'
      +'<div id="memberlist" style="color:var(--faint)">불러오는 중…</div>'
      +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:14px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px">'
      +'<input id="m_code" class="in" style="width:110px" maxlength="4" inputmode="numeric" placeholder="코드 4자리">'
      +'<input id="m_name" class="in" style="width:150px" placeholder="이름/메모">'
      +'<select id="m_role" class="in" style="width:auto"><option value="user">일반</option><option value="admin">관리자</option></select>'
      +'<button class="btn primary" onclick="addMember()">＋ 추가 / 수정</button></div>';
    let d; try{d=await apiJson('/api/members/list',{code:code()});}catch(e){d={ok:false,error:'통신 오류'};}
    const lb=$('memberlist'); if(!lb)return;
    if(!d.ok){lb.innerHTML='<span style="color:var(--danger)">❌ '+esch(d.error)+'</span>';return;}
    lb.innerHTML=(d.items||[]).map(m=>`<div class="hot" style="align-items:center">
      <div class="info"><div class="tt">${m.role==='admin'?'👑':'🙂'} <code style="font-size:14px">${esch(m.code)}</code> · ${esch(m.name||'')}</div>
        <div class="mt" style="color:${m.role==='admin'?'var(--gold)':'var(--muted)'}">${m.role==='admin'?'관리자 (즉시 업로드 가능)':'일반 (예약만)'}${m.locked?' · 기본 관리자':''}</div></div>
      ${m.locked?'':`<button data-rm="${esch(m.code)}">삭제</button>`}</div>`).join('')
      ||'<div style="color:var(--faint)">등록된 회원이 없어요.</div>';
    lb.querySelectorAll('button[data-rm]').forEach(b=>{b.onclick=async()=>{
      if(!confirm('회원코드 '+b.dataset.rm+' 를 삭제할까요?'))return;
      const r=await apiJson('/api/members/remove',{code:code(),ncode:b.dataset.rm});
      if(!r.ok){flash('❌ '+r.error);return;} flash('🗑 삭제됨'); loadMembers();};});
  }
  async function addMember(){
    const ncode=$('m_code').value.trim(), name=$('m_name').value.trim(), role=$('m_role').value;
    if(!/^\d{4}$/.test(ncode)){flash('회원코드는 숫자 4자리');return;}
    const r=await apiJson('/api/members/add',{code:code(),ncode,name,role});
    if(!r.ok){flash('❌ '+r.error);return;}
    flash('✅ 저장됨'); $('m_code').value='';$('m_name').value=''; loadMembers();
  }
  document.addEventListener('click',e=>{const pop=$('pop');if(!pop.classList.contains('open'))return;
    // composedPath: 클릭 순간의 경로(리렌더로 노드가 분리돼도 유효) — 캘린더 날짜 클릭 시 오닫힘 방지
    const path=e.composedPath?e.composedPath():[];
    if(path.indexOf(pop)===-1&&!pop.contains(e.target)&&e.target.id!=='upBtn')closePop();});

  /* ---- misc ---- */
  function flash(msg){const t=document.createElement('div');t.textContent=msg;
    t.style.cssText='position:fixed;left:50%;bottom:34px;transform:translateX(-50%);background:var(--raised);color:var(--ink);border:1px solid var(--line2);border-radius:12px;padding:13px 20px;font-size:13.5px;font-weight:700;box-shadow:var(--shadow);z-index:200';
    document.body.appendChild(t);setTimeout(()=>t.remove(),2400);}
  document.addEventListener('keydown',e=>{
    const cte=document.getElementById('cteOv');
    if(cte){if(e.key==='Escape')cte.remove();return;}         // 문구편집 중엔 모든 단축키 차단
    const tg=e.target&&e.target.tagName;
    if(tg==='INPUT'||tg==='TEXTAREA'||tg==='SELECT')return;   // 입력 중엔 슬라이드 단축키 무시
    if($('sScrim').classList.contains('open')){
      if(e.key==='Escape')closeSModal();
      else if(e.key==='ArrowRight')sSlide(1);
      else if(e.key==='ArrowLeft')sSlide(-1);
      return;
    }
    if(!$('scrim').classList.contains('open'))return;
    if($('mosov').classList.contains('open')){if(e.key==='Escape')closeMosaic();return;}
    if(e.key==='Escape')closeModal();
    else if(e.key==='ArrowRight')slide(1);
    else if(e.key==='ArrowLeft')slide(-1);
    else if(['1','2','3'].includes(e.key)){const hi=+e.key-1;if(PK&&PK.thumbs&&PK.thumbs[hi])pickLead(PK.thumbs[hi]);}
  });
  function toggleTheme(){const r=document.documentElement;
    const cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
    r.setAttribute('data-theme',cur==='dark'?'light':'dark');}

  // 마지막으로 보던 탭 복원(없으면 짤). 관리자 탭은 관리자일 때만.
  const VALID_TABS=['jjal','card','reel','thread','ie','sched','result','members'];
  refreshMe().then(()=>{
    let t=localStorage.getItem('mftab')||'jjal';
    if(!VALID_TABS.includes(t)) t='jjal';
    if(t==='members'&&!isAdmin()) t='jjal';
    setActive(t);
  }).catch(()=>setActive('jjal'));
  loadAccounts();
</script>
